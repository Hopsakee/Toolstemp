<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HTML Annotator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,600;1,600&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ground:         #EDF0F6;
    --panel:          #FFFFFF;
    --border:         #D8DCE8;
    --text:           #1C2333;
    --muted:          #6B7592;
    --subtle:         #A8B1C8;
    --accent:         #D4841A;
    --accent-dark:    #B8700F;
    --ink:            #3551C7;
    --sidebar-bg:     #F4F6FB;
    --hl-yellow:      #FDE68A;
    --hl-green:       #BBF7D0;
    --hl-blue:        #BFDBFE;
    --hl-pink:        #FBCFE8;
    --hl-yellow-edge: #D97706;
    --hl-green-edge:  #16A34A;
    --hl-blue-edge:   #2563EB;
    --hl-pink-edge:   #DB2777;
    --sans:  'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --serif: 'Spectral', Georgia, 'Times New Roman', serif;
    --mono:  'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --r:  6px;
    --rl: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--sans);
    background: var(--ground);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Header ─────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    height: 52px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  header h1 {
    margin: 0;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 600;
    font-size: 18px;
    letter-spacing: -0.015em;
    color: var(--text);
    display: flex;
    align-items: baseline;
    white-space: nowrap;
    user-select: none;
  }

  /* Self-referential: the tool highlights its own name */
  .brand-mark {
    background: linear-gradient(transparent 56%, rgba(253,230,138,.78) 56%);
    padding-bottom: 1px;
  }

  .doc-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-left: 4px;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .spacer { flex: 1; }

  .btn {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--panel);
    color: #374151;
    padding: 6px 12px;
    border-radius: var(--r);
    cursor: pointer;
    transition: background .12s, border-color .12s;
    white-space: nowrap;
    letter-spacing: .01em;
  }
  .btn:hover { background: var(--ground); border-color: var(--subtle); }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .btn:disabled { opacity: .38; cursor: not-allowed; }
  .btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  /* ── Layout ──────────────────────────────────────────── */
  main { flex: 1; display: flex; min-height: 0; }

  #viewer-wrap { flex: 1; position: relative; min-width: 0; background: #fff; }
  #viewer { width: 100%; height: 100%; border: 0; background: #fff; }

  /* ── Empty state ─────────────────────────────────────── */
  #empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 32px;
    background: #FAFBFD;
  }

  .mark-strip {
    display: flex;
    gap: 6px;
    margin-bottom: 2px;
  }
  .mark-strip span {
    width: 40px;
    height: 7px;
    border-radius: 2px;
    opacity: .65;
  }

  #empty h2 {
    margin: 0;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 600;
    font-size: 22px;
    color: var(--text);
    letter-spacing: -.02em;
  }
  #empty p {
    margin: 0;
    font-size: 13px;
    max-width: 360px;
    line-height: 1.7;
    color: var(--muted);
  }

  /* ── Sidebar ─────────────────────────────────────────── */
  aside {
    width: 318px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .side-head {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    flex-shrink: 0;
  }
  .side-head h2 {
    margin: 0;
    font-family: var(--sans);
    font-size: 10.5px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .side-head .count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: var(--ground);
    padding: 2px 7px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .side-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    counter-reset: ann;
  }
  .side-list::-webkit-scrollbar { width: 4px; }
  .side-list::-webkit-scrollbar-track { background: transparent; }
  .side-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  .side-empty {
    color: var(--subtle);
    font-size: 12px;
    text-align: center;
    padding: 32px 16px;
    line-height: 1.75;
    font-style: italic;
  }

  /* ── Annotation cards (ledger style) ─────────────────── */
  .card {
    counter-increment: ann;
    border: 1px solid var(--border);
    border-left: 3px solid var(--subtle);
    border-radius: var(--r);
    padding: 9px 10px 9px 11px;
    background: var(--panel);
    transition: box-shadow .12s, border-color .12s;
    cursor: pointer;
  }
  .card:hover { box-shadow: 0 1px 6px rgba(28,35,51,.07); }
  .card.active { box-shadow: 0 0 0 1.5px rgba(53,81,199,.18); }

  /* Left-edge color per annotation */
  .card-color-yellow { border-left-color: var(--hl-yellow-edge); }
  .card-color-green  { border-left-color: var(--hl-green-edge); }
  .card-color-blue   { border-left-color: var(--hl-blue-edge); }
  .card-color-pink   { border-left-color: var(--hl-pink-edge); }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    margin-bottom: 7px;
  }

  /* Ledger index number */
  .card-top::before {
    content: counter(ann, decimal-leading-zero);
    font-family: var(--mono);
    font-size: 9px;
    color: var(--subtle);
    flex-shrink: 0;
    padding-top: 2px;
    letter-spacing: -.02em;
    min-width: 16px;
  }

  /* dot hidden — color lives on the left border */
  .dot { display: none; }

  .card-quote {
    font-family: var(--mono);
    font-style: italic;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-del {
    border: 0;
    background: none;
    color: var(--subtle);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 1px 3px;
    border-radius: 4px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity .12s, color .12s, background .12s;
  }
  .card:hover .card-del { opacity: 1; }
  .card-del:hover { color: #ef4444; background: #fef2f2; }

  .card textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 7px 8px;
    font-family: var(--sans);
    font-size: 12px;
    resize: vertical;
    min-height: 36px;
    color: var(--text);
    background: var(--ground);
    transition: border-color .12s, background .12s;
    line-height: 1.5;
  }
  .card textarea:focus { outline: none; border-color: var(--ink); background: #fff; }
  .card textarea::placeholder { color: var(--subtle); font-style: italic; }

  .swatches {
    display: flex;
    gap: 5px;
    margin-top: 8px;
    align-items: center;
  }
  .swatch {
    width: 13px;
    height: 13px;
    border-radius: 3px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: transform .1s, border-color .1s;
  }
  .swatch:hover { transform: scale(1.2); }
  .swatch.sel { border-color: var(--text); transform: scale(1.15); }

  .card-time {
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--subtle);
    margin-left: auto;
    letter-spacing: -.02em;
  }

  /* ── Floating selection toolbar ──────────────────────── */
  #floattb {
    position: fixed;
    display: none;
    z-index: 9999;
    background: var(--text);
    border-radius: var(--rl);
    padding: 7px 9px;
    gap: 6px;
    align-items: center;
    box-shadow: 0 8px 28px rgba(0,0,0,.25), 0 2px 8px rgba(0,0,0,.14);
  }
  #floattb.show { display: flex; }

  #floattb .tb-swatch {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
    flex-shrink: 0;
    transition: border-color .1s, transform .1s;
  }
  #floattb .tb-swatch:hover { border-color: rgba(255,255,255,.6); transform: scale(1.15); }

  #floattb .tb-sep {
    width: 1px;
    height: 15px;
    background: rgba(255,255,255,.15);
    flex-shrink: 0;
  }

  #floattb .tb-note {
    background: var(--accent);
    color: #fff;
    border: 0;
    border-radius: 5px;
    padding: 5px 10px;
    font-family: var(--sans);
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background .12s;
    letter-spacing: .01em;
  }
  #floattb .tb-note:hover { background: var(--accent-dark); }

  #floattb .tb-x {
    background: none;
    border: 0;
    color: rgba(255,255,255,.38);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .12s;
  }
  #floattb .tb-x:hover { color: rgba(255,255,255,.9); }

  /* Touch: anchor to bottom */
  #floattb.bottom {
    top: auto !important;
    left: 50% !important;
    bottom: 18px;
    transform: translateX(-50%);
    padding: 10px 14px;
    gap: 10px;
    border-radius: 16px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: calc(100vw - 24px);
  }
  #floattb.bottom .tb-swatch { width: 28px; height: 28px; }
  #floattb.bottom .tb-note { padding: 8px 16px; font-size: 13px; }
  #floattb.bottom .tb-x { font-size: 20px; padding: 4px 8px; }

  /* ── Highlight color classes (viewer + sidebar) ──────── */
  .pa-color-yellow { background: var(--hl-yellow); }
  .pa-color-green  { background: var(--hl-green); }
  .pa-color-blue   { background: var(--hl-blue); }
  .pa-color-pink   { background: var(--hl-pink); }

  /* ── Toast ───────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: #fff;
    padding: 8px 16px;
    border-radius: var(--r);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    z-index: 10000;
    opacity: 0;
    transition: opacity .22s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: .95; }

  input[type="file"] { display: none; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<header>
  <h1>HTML&nbsp;<span class="brand-mark">Annotator</span></h1>
  <span class="doc-name" id="docName"></span>
  <span class="spacer"></span>
  <button class="btn primary" id="btnOpen">Open HTML…</button>
  <button class="btn" id="btnLoadAnn">Load Annotations…</button>
  <button class="btn" id="btnSaveAnn" disabled>Save</button>
  <button class="btn" id="btnMd" disabled>Export Markdown</button>
  <button class="btn" id="btnHtml" disabled>Export Annotated HTML</button>
  <input type="file" id="fileHtml" accept=".html,.htm,text/html">
  <input type="file" id="fileAnn" accept=".json,application/json">
</header>

<main>
  <div id="viewer-wrap">
    <iframe id="viewer" sandbox="allow-same-origin allow-scripts" title="Document viewer"></iframe>
    <div id="empty">
      <div class="mark-strip" aria-hidden="true">
        <span style="background:#FDE68A;"></span>
        <span style="background:#BBF7D0;"></span>
        <span style="background:#BFDBFE;"></span>
        <span style="background:#FBCFE8;"></span>
      </div>
      <h2>Drop in a document to begin</h2>
      <p>Select any passage to mark it — by color, by thought. Save your layer separately, or bake your notes back into the file.</p>
      <button class="btn primary" id="btnOpen2">Open HTML…</button>
    </div>
  </div>
  <aside>
    <div class="side-head">
      <h2>Annotations</h2>
      <span class="count" id="annCount">0</span>
    </div>
    <div class="side-list" id="sideList">
      <div class="side-empty">No annotations yet.<br>Select text in the document to add one.</div>
    </div>
  </aside>
</main>

<div id="floattb" role="toolbar" aria-label="Highlight options">
  <span class="tb-swatch pa-color-yellow" data-color="yellow" role="button" aria-label="Highlight yellow" tabindex="0"></span>
  <span class="tb-swatch pa-color-green"  data-color="green"  role="button" aria-label="Highlight green"  tabindex="0"></span>
  <span class="tb-swatch pa-color-blue"   data-color="blue"   role="button" aria-label="Highlight blue"   tabindex="0"></span>
  <span class="tb-swatch pa-color-pink"   data-color="pink"   role="button" aria-label="Highlight pink"   tabindex="0"></span>
  <div class="tb-sep" aria-hidden="true"></div>
  <button class="tb-note" data-color="yellow">+ Note</button>
  <button class="tb-x" title="Dismiss" aria-label="Dismiss">&#215;</button>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
"use strict";
//==========================================================================
// State
//==========================================================================
let originalHTML = "";
let docTitle = "";
let docKey = "";
let annotations = [];
let pendingSel = null;
let activeId = null;

const COLORS = ["yellow","green","blue","pink"];
const COLOR_HEX = {yellow:"#fde68a",green:"#bbf7d0",blue:"#bfdbfe",pink:"#fbcfe8"};
const COLOR_BORDER = {yellow:"#d97706",green:"#16a34a",blue:"#2563eb",pink:"#db2777"};
const CTX = 40;

const viewer  = document.getElementById('viewer');
const sideList= document.getElementById('sideList');
const emptyEl = document.getElementById('empty');
const floattb = document.getElementById('floattb');

//==========================================================================
// Helpers: text-node walking and offset math
//   The wrapping of highlights never adds or removes characters, so a global
//   character offset over the (script/style-excluded) text is a stable anchor.
//==========================================================================
function getTextNodes(root){
  const doc = root.ownerDocument;
  const walker = doc.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(n){
      const tag = n.parentNode && n.parentNode.nodeName;
      if(tag==='SCRIPT'||tag==='STYLE'||tag==='NOSCRIPT') return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const out=[]; let n;
  while((n=walker.nextNode())) out.push(n);
  return out;
}
function getFullText(root){ return getTextNodes(root).map(n=>n.nodeValue).join(''); }

function globalOffset(root, node, offset){
  if(node.nodeType !== Node.TEXT_NODE){
    if(node.childNodes && node.childNodes.length){
      if(offset >= node.childNodes.length){
        const c = node.childNodes[node.childNodes.length-1];
        return globalOffset(root, c, c.nodeType===Node.TEXT_NODE ? c.nodeValue.length : (c.childNodes?c.childNodes.length:0));
      }
      return globalOffset(root, node.childNodes[offset], 0);
    }
  }
  const nodes = getTextNodes(root);
  let total=0;
  for(const n of nodes){
    if(n===node) return total + offset;
    total += n.nodeValue.length;
  }
  return total;
}

function wrapRange(root, start, end, color, id){
  const nodes = getTextNodes(root);
  let total=0; const segs=[];
  for(const n of nodes){
    const len=n.nodeValue.length, ns=total, ne=total+len;
    if(ne>start && ns<end){
      const a=Math.max(0,start-ns), b=Math.min(len,end-ns);
      if(b>a) segs.push({node:n,a,b});
    }
    total=ne;
    if(total>=end) break;
  }
  for(let i=segs.length-1;i>=0;i--){
    const s=segs[i];
    const range=root.ownerDocument.createRange();
    range.setStart(s.node,s.a); range.setEnd(s.node,s.b);
    const span=root.ownerDocument.createElement('span');
    span.className='pa-hl pa-color-'+color;
    span.setAttribute('data-pa-id', id);
    try{ range.surroundContents(span); }catch(e){}
  }
  return segs.length>0;
}

function reAnchor(a, full){
  if(full.slice(a.start, a.end) === a.exact) return true;
  if(!a.exact) return false;
  let idx = a.prefix ? full.indexOf(a.prefix + a.exact) : -1;
  if(idx >= 0){ a.start = idx + a.prefix.length; a.end = a.start + a.exact.length; return true; }
  let best=-1, bestDist=Infinity, from=0, p;
  while((p=full.indexOf(a.exact, from)) !== -1){
    const d=Math.abs(p-a.start);
    if(d<bestDist){bestDist=d;best=p;}
    from=p+1;
  }
  if(best>=0){ a.start=best; a.end=best+a.exact.length; return true; }
  return false;
}

//==========================================================================
// Render the viewer from pristine HTML + current annotations
//==========================================================================
const VIEWER_CSS = `.pa-hl{border-radius:2px;cursor:pointer;
  -webkit-box-decoration-break:clone;box-decoration-break:clone;transition:filter .1s;}
  .pa-hl:hover{filter:brightness(.94);}
  .pa-color-yellow{background:#fde68a;} .pa-color-green{background:#bbf7d0;}
  .pa-color-blue{background:#bfdbfe;}  .pa-color-pink{background:#fbcfe8;}
  .pa-flash{animation:paflash .9s;} @keyframes paflash{0%,100%{filter:none}40%{filter:brightness(.8)}}`;

function render(preserveScroll){
  if(!originalHTML){ return; }
  const prevY = (preserveScroll && viewer.contentWindow) ? viewer.contentWindow.scrollY : 0;
  viewer.onload = () => {
    const doc = viewer.contentDocument;
    const st = doc.createElement('style'); st.textContent = VIEWER_CSS;
    doc.head ? doc.head.appendChild(st) : doc.documentElement.appendChild(st);
    const full = getFullText(doc.body);
    annotations.forEach(a => { reAnchor(a, full); wrapRange(doc.body, a.start, a.end, a.color, a.id); });
    attachViewerHandlers(doc);
    try{ viewer.contentWindow.scrollTo(0, prevY); }catch(e){}
  };
  viewer.srcdoc = originalHTML;
}

let selTimer = null;
function attachViewerHandlers(doc){
  doc.addEventListener('mouseup', scheduleSelCheck);
  doc.addEventListener('touchend', scheduleSelCheck);
  doc.addEventListener('selectionchange', scheduleSelCheck);
  doc.addEventListener('click', (e)=>{
    const hl = e.target.closest && e.target.closest('.pa-hl');
    if(hl){ selectCard(hl.getAttribute('data-pa-id'), true); }
  });
}

function scheduleSelCheck(){ clearTimeout(selTimer); selTimer = setTimeout(evaluateSelection, 220); }

function evaluateSelection(){
  const win = viewer.contentWindow;
  if(!win) return;
  const sel = win.getSelection();
  if(!sel || sel.isCollapsed || !sel.toString().trim()){ hideToolbar(); return; }
  const range = sel.getRangeAt(0);
  const root = viewer.contentDocument.body;
  let s = globalOffset(root, range.startContainer, range.startOffset);
  let e = globalOffset(root, range.endContainer, range.endOffset);
  if(s>e){ const t=s; s=e; e=t; }
  if(e<=s){ hideToolbar(); return; }
  const full = getFullText(root);
  pendingSel = {
    start:s, end:e,
    exact: full.slice(s,e),
    prefix: full.slice(Math.max(0,s-CTX), s),
    suffix: full.slice(e, e+CTX)
  };
  showToolbar(range);
}

//==========================================================================
// Floating toolbar
//==========================================================================
const IS_TOUCH = (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) || ('ontouchstart' in window);
function showToolbar(range){
  if(IS_TOUCH){
    floattb.classList.add('bottom');
  } else {
    floattb.classList.remove('bottom');
    const r = range.getBoundingClientRect();
    const f = viewer.getBoundingClientRect();
    let top = f.top + r.top - 48;
    let left = f.left + r.left;
    if(top < 6) top = f.top + r.bottom + 8;
    left = Math.max(8, Math.min(left, window.innerWidth - 260));
    floattb.style.top = top + 'px';
    floattb.style.left = left + 'px';
  }
  floattb.classList.add('show');
}
function hideToolbar(){ floattb.classList.remove('show'); }

function keepSel(el){ el.addEventListener('mousedown', e=>e.preventDefault()); }
floattb.querySelectorAll('.tb-swatch').forEach(sw=>{
  keepSel(sw);
  sw.addEventListener('click', ()=> commitPending(sw.dataset.color, false));
});
const tbNote = floattb.querySelector('.tb-note');
keepSel(tbNote);
tbNote.addEventListener('click', ()=> commitPending('yellow', true));
const tbX = floattb.querySelector('.tb-x');
keepSel(tbX);
tbX.addEventListener('click', ()=>{
  hideToolbar(); pendingSel=null;
  try{ viewer.contentWindow.getSelection().removeAllRanges(); }catch(e){}
});

function commitPending(color, focusNote){
  if(!pendingSel) return;
  const a = Object.assign({
    id: 'a'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36),
    color, note:'', created: new Date().toISOString()
  }, pendingSel);
  annotations.push(a);
  pendingSel = null;
  hideToolbar();
  try{ viewer.contentWindow.getSelection().removeAllRanges(); }catch(e){}
  render(true);
  renderSidebar();
  persist();
  if(focusNote){
    const ta = sideList.querySelector('.card[data-id="'+a.id+'"] textarea');
    if(ta){ ta.scrollIntoView({block:'center'}); ta.focus(); }
  }
}

//==========================================================================
// Sidebar
//==========================================================================
function renderSidebar(){
  document.getElementById('annCount').textContent = annotations.length;
  if(!annotations.length){
    sideList.innerHTML = '<div class="side-empty">No annotations yet.<br>Select text in the document to add one.</div>';
    return;
  }
  const sorted = annotations.slice().sort((x,y)=>x.start-y.start);
  sideList.innerHTML = '';
  sorted.forEach((a, idx)=>{
    const card = document.createElement('div');
    card.className = 'card card-color-'+a.color + (a.id===activeId?' active':'');
    card.setAttribute('data-id', a.id);

    const top = document.createElement('div'); top.className='card-top';
    const dot = document.createElement('span'); dot.className='dot'; dot.style.background=COLOR_HEX[a.color];
    const quote = document.createElement('div'); quote.className='card-quote'; quote.textContent=a.exact;
    const del = document.createElement('button'); del.className='card-del'; del.title='Delete'; del.textContent='×';
    top.append(dot, quote, del);

    const ta = document.createElement('textarea');
    ta.placeholder = 'Add a note…';
    ta.value = a.note || '';

    const sw = document.createElement('div'); sw.className='swatches';
    COLORS.forEach(c=>{
      const s=document.createElement('span'); s.className='swatch pa-color-'+c+(c===a.color?' sel':'');
      s.dataset.color=c; sw.appendChild(s);
    });
    const time=document.createElement('span'); time.className='card-time';
    time.textContent = (a.created||'').slice(0,10);
    sw.appendChild(time);

    card.append(top, ta, sw);
    sideList.appendChild(card);

    card.addEventListener('click', e=>{
      if(e.target.closest('textarea')||e.target.closest('.swatch')||e.target.closest('.card-del')) return;
      selectCard(a.id, true);
    });
    del.addEventListener('click', ()=> deleteAnnotation(a.id));
    ta.addEventListener('input', ()=>{ a.note=ta.value; persist(); });
    sw.querySelectorAll('.swatch').forEach(s=>{
      s.addEventListener('click', ()=>{
        a.color=s.dataset.color; render(true); renderSidebar(); persist();
      });
    });
  });
}

function selectCard(id, scrollViewer){
  activeId = id;
  renderSidebar();
  const card = sideList.querySelector('.card[data-id="'+id+'"]');
  if(card) card.scrollIntoView({block:'nearest'});
  if(scrollViewer){
    const span = viewer.contentDocument && viewer.contentDocument.querySelector('.pa-hl[data-pa-id="'+id+'"]');
    if(span){ span.scrollIntoView({block:'center'}); span.classList.add('pa-flash');
      setTimeout(()=>span.classList.remove('pa-flash'),900); }
  }
}

function deleteAnnotation(id){
  annotations = annotations.filter(a=>a.id!==id);
  if(activeId===id) activeId=null;
  render(true); renderSidebar(); persist();
}

//==========================================================================
// Open / Load
//==========================================================================
function loadHTMLString(text, name){
  originalHTML = text;
  const m = text.match(/<title[^>]*>([^<]*)<\/title>/i);
  docTitle = (m && m[1].trim()) || name || 'Untitled';
  document.getElementById('docName').textContent = name || docTitle;
  docKey = hashStr(text);
  annotations = [];
  activeId = null;

  const saved = localStorage.getItem(docKey);
  if(saved){
    try{ const p=JSON.parse(saved); if(p && Array.isArray(p.annotations)) annotations=p.annotations; }catch(e){}
    if(annotations.length) toast('Restored '+annotations.length+' saved annotation(s)');
  }

  emptyEl.style.display='none';
  ['btnSaveAnn','btnMd','btnHtml'].forEach(id=>document.getElementById(id).disabled=false);
  render(false);
  renderSidebar();
}

function applyLoadedAnnotations(data){
  if(!originalHTML){ toast('Open an HTML document first'); return; }
  let list = Array.isArray(data) ? data : (data && data.annotations);
  if(!Array.isArray(list)){ toast('Unrecognized annotations file'); return; }
  annotations = list.map(a=>Object.assign({
    id:'a'+Math.random().toString(36).slice(2), color:'yellow', note:'', created:'', exact:'', prefix:'', suffix:'', start:0, end:0
  }, a));
  activeId=null;
  render(true); renderSidebar(); persist();
  toast('Loaded '+annotations.length+' annotation(s)');
}

//==========================================================================
// Exports
//==========================================================================
function serialize(){
  return { version:1, docTitle, savedAt:new Date().toISOString(), annotations };
}
function download(filename, content, type){
  const blob = new Blob([content], {type:type||'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 0);
}
function baseName(){ return (docTitle||'document').replace(/[^\w\-]+/g,'_').slice(0,60); }

function buildMarkdown(){
  const sorted = annotations.slice().sort((x,y)=>x.start-y.start);
  let md = '# Annotations — '+docTitle+'\n\n';
  md += '_Exported '+new Date().toISOString().slice(0,10)+' · '+sorted.length+' annotation(s)_\n\n';
  sorted.forEach((a,i)=>{
    md += '## '+(i+1)+'. '+a.color.charAt(0).toUpperCase()+a.color.slice(1)+' highlight\n\n';
    md += '> '+String(a.exact).replace(/\n/g,'\n> ')+'\n\n';
    if(a.note && a.note.trim()) md += a.note.trim()+'\n\n';
    md += '---\n\n';
  });
  return md;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function mdToHtml(s){
  let h = esc(s);
  h = h.replace(/\[([^\]]+)\]\((https?:[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  h = h.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  h = h.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  h = h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h = h.replace(/\n/g,'<br>');
  return h;
}

const EXPORT_CSS = `
/* ===== Personal annotations (added by HTML Annotator) ===== */
.pa-hl{border-radius:2px;-webkit-box-decoration-break:clone;box-decoration-break:clone;}
.pa-color-yellow{background:#fde68a;} .pa-color-green{background:#bbf7d0;}
.pa-color-blue{background:#bfdbfe;}  .pa-color-pink{background:#fbcfe8;}
details.pa-annotation{display:inline-block;vertical-align:text-bottom;margin:0 2px 0 4px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;
  border:1px solid #e2e8f0;border-left:4px solid #94a3b8;border-radius:7px;
  background:#f8fafc;padding:2px 9px;max-width:480px;}
details.pa-annotation.pa-edge-yellow{border-left-color:#d97706;}
details.pa-annotation.pa-edge-green{border-left-color:#16a34a;}
details.pa-annotation.pa-edge-blue{border-left-color:#2563eb;}
details.pa-annotation.pa-edge-pink{border-left-color:#db2777;}
details.pa-annotation>summary{cursor:pointer;color:#475569;font-weight:600;list-style:none;
  user-select:none;outline:none;}
details.pa-annotation>summary::-webkit-details-marker{display:none;}
details.pa-annotation>summary::before{content:'▸ ';color:#94a3b8;}
details.pa-annotation[open]>summary::before{content:'▾ ';}
.pa-annotation-body{padding:7px 2px 4px;color:#334155;line-height:1.55;
  border-top:1px solid #e2e8f0;margin-top:5px;}
.pa-annotation-body code{background:#eef2f7;padding:1px 5px;border-radius:4px;font-size:12px;}
`;

function buildAnnotatedHTML(){
  const doc = new DOMParser().parseFromString(originalHTML, 'text/html');
  const full = getFullText(doc.body);
  annotations.forEach(a=>{ reAnchor(a, full); wrapRange(doc.body, a.start, a.end, a.color, a.id); });
  annotations.forEach(a=>{
    if(!a.note || !a.note.trim()) return;
    const spans = doc.querySelectorAll('.pa-hl[data-pa-id="'+a.id+'"]');
    if(!spans.length) return;
    const last = spans[spans.length-1];
    const det = doc.createElement('details');
    det.className = 'pa-annotation pa-edge-'+a.color;
    const sum = doc.createElement('summary'); sum.textContent = 'Note';
    const body = doc.createElement('div'); body.className='pa-annotation-body';
    body.innerHTML = mdToHtml(a.note.trim());
    det.append(sum, body);
    last.after(det);
  });
  const style = doc.createElement('style'); style.textContent = EXPORT_CSS;
  (doc.head || doc.documentElement).appendChild(style);
  return '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
}

//==========================================================================
// Persistence + misc
//==========================================================================
function persist(){ if(docKey){ try{ localStorage.setItem(docKey, JSON.stringify(serialize())); }catch(e){} } }
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return 'pa_'+(h>>>0)+'_'+s.length; }

let toastTimer;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

//==========================================================================
// Wire up controls
//==========================================================================
const fileHtml=document.getElementById('fileHtml'), fileAnn=document.getElementById('fileAnn');
document.getElementById('btnOpen').onclick = ()=>fileHtml.click();
document.getElementById('btnOpen2').onclick = ()=>fileHtml.click();
document.getElementById('btnLoadAnn').onclick = ()=>fileAnn.click();

fileHtml.onchange = e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>loadHTMLString(r.result, f.name); r.readAsText(f);
  fileHtml.value='';
};
fileAnn.onchange = e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ applyLoadedAnnotations(JSON.parse(r.result)); }catch(err){ toast('Invalid JSON file'); } };
  r.readAsText(f); fileAnn.value='';
};

document.getElementById('btnSaveAnn').onclick = ()=>{
  if(!annotations.length){ toast('No annotations to save'); return; }
  download(baseName()+'.annotations.json', JSON.stringify(serialize(),null,2), 'application/json');
};
document.getElementById('btnMd').onclick = ()=>{
  if(!annotations.length){ toast('No annotations to export'); return; }
  download(baseName()+'.annotations.md', buildMarkdown(), 'text/markdown');
};
document.getElementById('btnHtml').onclick = ()=>{
  if(!originalHTML){ return; }
  download(baseName()+'.annotated.html', buildAnnotatedHTML(), 'text/html');
};

window.addEventListener('keydown', e=>{ if(e.key==='Escape') hideToolbar(); });
window.addEventListener('resize', hideToolbar);
</script>
