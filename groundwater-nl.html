<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grondwaterstanden Nederland — trends 25 jaar</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117; color: #e6edf3; overflow: hidden;
  }
  #map { position: absolute; inset: 0; z-index: 1; background:#0d1117; }

  /* ---- demo banner ---- */
  #demo-banner {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1200;
    background: #b2182b; color: #fff; text-align: center;
    font-size: 0.8rem; font-weight: 600; letter-spacing: .02em;
    padding: 6px 12px; line-height: 1.4;
  }
  #demo-banner code { background: rgba(255,255,255,.18); padding: 1px 6px; border-radius: 4px; }
  #demo-banner.hidden { display: none; }

  /* ---- control panel ---- */
  .panel {
    position: absolute; z-index: 1000;
    background: rgba(22,27,34,.94); border: 1px solid #30363d;
    border-radius: 12px; backdrop-filter: blur(8px);
    box-shadow: 0 8px 28px rgba(0,0,0,.45);
  }
  #controls { top: 14px; left: 14px; width: 320px; max-width: calc(100vw - 28px);
    padding: 16px 18px; max-height: calc(100vh - 28px); overflow-y: auto; }
  #controls.with-banner { top: 48px; }
  h1 { font-size: 1.05rem; font-weight: 700; color: #f0f6fc; line-height: 1.3; }
  .sub { font-size: .76rem; color: #8b949e; margin-top: 2px; }

  .group { margin-top: 14px; }
  .group > .label { font-size: .72rem; text-transform: uppercase; letter-spacing: .07em;
    color: #8b949e; margin-bottom: 7px; font-weight: 600; }

  .seg { display: flex; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
  .seg button { flex: 1; background: transparent; color: #c9d1d9; border: none;
    padding: 8px 6px; font-size: .82rem; cursor: pointer; transition: background .12s; }
  .seg button:hover { background: #21262d; }
  .seg button.active { background: #1f6feb; color: #fff; font-weight: 600; }

  label.check { display: flex; align-items: center; gap: 8px; font-size: .83rem;
    color: #c9d1d9; cursor: pointer; }
  label.check input { accent-color: #1f6feb; width: 15px; height: 15px; }

  /* ---- legend ---- */
  .legend-bar { height: 12px; border-radius: 6px; margin: 6px 0 4px;
    background: linear-gradient(90deg,#b2182b,#ef8a62,#fddbc7,#f7f7f7,#d1e5f0,#67a9cf,#2166ac); }
  .legend-scale { display: flex; justify-content: space-between; font-size: .68rem; color: #8b949e; }
  .legend-ends { display: flex; justify-content: space-between; font-size: .72rem;
    color: #c9d1d9; margin-top: 2px; }

  /* ---- stats ---- */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 8px 10px; }
  .stat .v { font-size: 1.15rem; font-weight: 700; color: #f0f6fc; }
  .stat .k { font-size: .68rem; color: #8b949e; margin-top: 1px; }

  .src { margin-top: 14px; font-size: .68rem; color: #6e7681; line-height: 1.5;
    border-top: 1px solid #21262d; padding-top: 10px; }
  .src a { color: #58a6ff; text-decoration: none; }

  /* ---- popup ---- */
  .leaflet-popup-content-wrapper { background: #161b22; color: #e6edf3;
    border: 1px solid #30363d; border-radius: 10px; }
  .leaflet-popup-tip { background: #161b22; border: 1px solid #30363d; }
  .leaflet-popup-content { margin: 12px 14px; font-size: .8rem; line-height: 1.5; }
  .pop-title { font-weight: 700; color: #f0f6fc; font-size: .9rem; }
  .pop-id { font-size: .68rem; color: #8b949e; margin-bottom: 6px; }
  .pop-row { display: flex; justify-content: space-between; gap: 14px; }
  .pop-row .lab { color: #8b949e; }
  .pop-row .val { font-weight: 600; }
  .rise { color: #6cb0e6; } .fall { color: #f08a72; }
  .spark { margin-top: 8px; }
  .spark-cap { font-size: .66rem; color: #6e7681; margin-top: 2px; text-align:center; }

  .leaflet-control-attribution { font-size: 10px !important; }
  @media (max-width: 560px){ #controls{ width: calc(100vw - 28px); } }
</style>
</head>
<body>
<div id="demo-banner" class="hidden"></div>
<div id="map"></div>

<div id="controls" class="panel">
  <h1>Grondwaterstanden Nederland</h1>
  <div class="sub" id="subtitle">Trend in mediane grondwaterstand</div>

  <div class="group">
    <div class="label">Seizoen</div>
    <div class="seg" id="season">
      <button data-season="summer" class="active">Zomer · apr–sep</button>
      <button data-season="winter">Winter · okt–mrt</button>
    </div>
  </div>

  <div class="group">
    <div class="label">Filter</div>
    <label class="check"><input type="checkbox" id="sigOnly" />
      Alleen significante trend (p&nbsp;&lt;&nbsp;0,05)</label>
  </div>

  <div class="group">
    <div class="label">Trend (cm per jaar)</div>
    <div class="legend-bar"></div>
    <div class="legend-scale"><span>−2</span><span>−1</span><span>0</span><span>+1</span><span>+2</span></div>
    <div class="legend-ends"><span>↓ daling</span><span>stijging ↑</span></div>
  </div>

  <div class="group">
    <div class="label">Overzicht <span id="seasonTag" style="color:#58a6ff"></span></div>
    <div class="stats">
      <div class="stat"><div class="v" id="stN">–</div><div class="k">locaties getoond</div></div>
      <div class="stat"><div class="v" id="stMed">–</div><div class="k">mediane trend</div></div>
      <div class="stat"><div class="v" id="stFall">–</div><div class="k">% dalend</div></div>
      <div class="stat"><div class="v" id="stRise">–</div><div class="k">% stijgend</div></div>
    </div>
  </div>

  <div class="src" id="src"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
/* ============================================================
   Data is injected here by scripts/fetch_groundwater_dino.py.
   Until then GROUNDWATER_DATA is null and a labelled DEMO
   dataset is generated so the interface stays explorable.
   ============================================================ */
const GROUNDWATER_DATA = null; /* __DATA_PLACEHOLDER__ */

// ---------- demo data (clearly synthetic) ----------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function buildDemoData(){
  const cities = [
    ["Amsterdam",52.37,4.90],["Rotterdam",51.92,4.48],["Den Haag",52.08,4.31],
    ["Utrecht",52.09,5.12],["Eindhoven",51.44,5.48],["Groningen",53.22,6.57],
    ["Zwolle",52.51,6.09],["Arnhem",51.98,5.91],["Maastricht",50.85,5.69],
    ["Leeuwarden",53.20,5.79],["Enschede",52.22,6.90],["Breda",51.57,4.78],
    ["Assen",52.99,6.56],["Middelburg",51.50,3.61],["Apeldoorn",52.21,5.97],
    ["Den Helder",52.96,4.76],["Venlo",51.37,6.17],["Emmen",52.78,6.91],
    ["Lelystad",52.52,5.47],["Tilburg",51.56,5.09]
  ];
  const rnd = mulberry32(20260619);
  const years = []; for(let y=2001;y<=2025;y++) years.push(y);
  const stations = cities.map((c,i)=>{
    function series(baseSlope){
      const base = -1 + rnd()*3;          // m+NAP baseline
      const slope = baseSlope + (rnd()-0.5)*0.012; // m/yr
      const med = years.map((y,k)=> +(base + slope*k + (rnd()-0.5)*0.06).toFixed(3));
      // crude regression for demo r2/p
      const n=years.length, mx=(n-1)/2, my=med.reduce((a,b)=>a+b)/n;
      let sxy=0,sxx=0,syy=0; med.forEach((v,k)=>{sxy+=(k-mx)*(v-my);sxx+=(k-mx)**2;syy+=(v-my)**2;});
      const s=sxy/sxx, r2=(sxy*sxy)/(sxx*syy||1);
      return {median:med, slope_cm_yr:+(s*100).toFixed(3), r2:+r2.toFixed(2),
              p:r2>0.55?0.01:0.2, n:n};
    }
    const trendBias = (rnd()-0.55)*0.03; // slight net decline bias
    return {
      id:"DEMO"+String(i+1).padStart(3,"0"), tube:1, name:c[0]+" (demo)",
      lat:c[1], lon:c[2], ground_level:+(c[1]/30).toFixed(2),
      summer:series(trendBias-0.004), winter:series(trendBias)
    };
  });
  return {demo:true, generated:"—", period:{start:2001,end:2025},
          years, source:"Synthetische demodata", stations};
}

const DATA = GROUNDWATER_DATA || buildDemoData();
const YEARS = DATA.years || (function(){const a=[];for(let y=DATA.period.start;y<=DATA.period.end;y++)a.push(y);return a;})();

// ---------- color scale (diverging, cm/yr, clamp ±2) ----------
const STOPS = [[-2,'#b2182b'],[-1,'#ef8a62'],[-0.5,'#fddbc7'],[0,'#f7f7f7'],
               [0.5,'#d1e5f0'],[1,'#67a9cf'],[2,'#2166ac']];
function hex2rgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function colorFor(v){
  if(v==null||isNaN(v)) return '#666';
  v=Math.max(-2,Math.min(2,v));
  for(let i=0;i<STOPS.length-1;i++){
    const [a,ca]=STOPS[i],[b,cb]=STOPS[i+1];
    if(v>=a&&v<=b){const t=(v-a)/(b-a||1);const A=hex2rgb(ca),B=hex2rgb(cb);
      return `rgb(${A.map((x,k)=>Math.round(x+(B[k]-x)*t)).join(',')})`;}
  }
  return STOPS[STOPS.length-1][1];
}

// ---------- map ----------
const map = L.map('map',{zoomControl:true,attributionControl:true}).setView([52.15,5.4],8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

let season='summer';
let sigOnly=false;
const layer = L.layerGroup().addTo(map);

function fmt(v,d=2){return (v>0?'+':'')+v.toFixed(d);}

function sparkline(st){
  const W=240,H=70,pad=4;
  const all=[...st.summer.median,...st.winter.median].filter(v=>v!=null);
  const min=Math.min(...all),max=Math.max(...all),rng=(max-min)||1;
  const xx=k=>pad+k*(W-2*pad)/(YEARS.length-1);
  const yy=v=>H-pad-((v-min)/rng)*(H-2*pad);
  function path(arr){return arr.map((v,k)=>(k?'L':'M')+xx(k).toFixed(1)+' '+yy(v).toFixed(1)).join(' ');}
  function trendLine(s){ // s: season obj, draw fitted line across range
    const a=s.median, mx=(YEARS.length-1)/2, my=a.reduce((x,y)=>x+y,0)/a.length;
    const slope=s.slope_cm_yr/100; const b=my-slope*mx;
    const y0=yy(b), y1=yy(b+slope*(YEARS.length-1));
    return `M${pad} ${y0.toFixed(1)} L${(W-pad)} ${y1.toFixed(1)}`;
  }
  return `<svg class="spark" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <rect x="0" y="0" width="${W}" height="${H}" fill="#0d1117" rx="6"/>
    <path d="${path(st.winter.median)}" fill="none" stroke="#3b82c4" stroke-width="1" opacity=".55"/>
    <path d="${path(st.summer.median)}" fill="none" stroke="#e08a5a" stroke-width="1" opacity=".55"/>
    <path d="${trendLine(st.winter)}" fill="none" stroke="#6cb0e6" stroke-width="1.6" stroke-dasharray="3 2"/>
    <path d="${trendLine(st.summer)}" fill="none" stroke="#f08a72" stroke-width="1.6" stroke-dasharray="3 2"/>
  </svg>
  <div class="spark-cap">mediane stand m+NAP, ${YEARS[0]}–${YEARS[YEARS.length-1]} &nbsp;·&nbsp;
     <span style="color:#f08a72">zomer</span> / <span style="color:#6cb0e6">winter</span></div>`;
}

function popupHtml(st){
  const s=st.summer, w=st.winter;
  const sigTxt=p=>p==null?'':(p<0.05?' (significant)':' (niet significant)');
  return `<div class="pop-title">${st.name||st.id}</div>
    <div class="pop-id">${st.id}${st.tube?(' · filter '+st.tube):''}${st.ground_level!=null?(' · maaiveld '+st.ground_level.toFixed(2)+' m+NAP'):''}</div>
    <div class="pop-row"><span class="lab">Trend zomer</span>
      <span class="val ${s.slope_cm_yr<0?'fall':'rise'}">${fmt(s.slope_cm_yr)} cm/jr${sigTxt(s.p)}</span></div>
    <div class="pop-row"><span class="lab">Trend winter</span>
      <span class="val ${w.slope_cm_yr<0?'fall':'rise'}">${fmt(w.slope_cm_yr)} cm/jr${sigTxt(w.p)}</span></div>
    <div class="pop-row"><span class="lab">Totaal over ${YEARS.length} jr</span>
      <span class="val">${fmt(s.slope_cm_yr*YEARS.length,0)} / ${fmt(w.slope_cm_yr*YEARS.length,0)} cm</span></div>
    ${sparkline(st)}`;
}

function passes(st){
  if(!sigOnly) return true;
  const p=st[season].p; return p!=null && p<0.05;
}

function render(){
  layer.clearLayers();
  const shown=DATA.stations.filter(passes);
  shown.forEach(st=>{
    const v=st[season].slope_cm_yr;
    const m=L.circleMarker([st.lat,st.lon],{
      radius:6+Math.min(6,Math.abs(v)*3),
      fillColor:colorFor(v), color:'#0d1117', weight:1, fillOpacity:.9
    });
    m.bindPopup(popupHtml(st),{maxWidth:280,minWidth:260});
    m.bindTooltip(`${st.name||st.id}: ${fmt(v)} cm/jr`,{direction:'top',opacity:.9});
    layer.addLayer(m);
  });
  // stats
  const slopes=shown.map(s=>s[season].slope_cm_yr).sort((a,b)=>a-b);
  const n=slopes.length;
  const median = n? (n%2?slopes[(n-1)/2]:(slopes[n/2-1]+slopes[n/2])/2):0;
  const fall=shown.filter(s=>s[season].slope_cm_yr<0).length;
  const rise=n-fall;
  document.getElementById('stN').textContent=n;
  document.getElementById('stMed').textContent=n?fmt(median)+' cm/jr':'–';
  document.getElementById('stMed').className='v '+(median<0?'fall':'rise');
  document.getElementById('stFall').textContent=n?Math.round(fall/n*100)+'%':'–';
  document.getElementById('stRise').textContent=n?Math.round(rise/n*100)+'%':'–';
  document.getElementById('seasonTag').textContent= season==='summer'?'· zomer':'· winter';
}

// ---------- controls ----------
document.querySelectorAll('#season button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('#season button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); season=b.dataset.season; render();
  });
});
document.getElementById('sigOnly').addEventListener('change',e=>{sigOnly=e.target.checked;render();});

// ---------- source / demo banner ----------
(function(){
  const src=document.getElementById('src');
  if(DATA.demo){
    const b=document.getElementById('demo-banner');
    b.classList.remove('hidden');
    b.innerHTML='⚠ DEMODATA — niet echt. Voer <code>scripts/fetch_groundwater_dino.py</code> uit om echte DINOloket/BRO-metingen te laden.';
    document.getElementById('controls').classList.add('with-banner');
    src.innerHTML='Bron: <b>synthetische demodata</b> (placeholder).<br>'+
      'Periode '+YEARS[0]+'–'+YEARS[YEARS.length-1]+' · '+DATA.stations.length+' locaties.';
  } else {
    src.innerHTML='Bron: <a href="https://www.dinoloket.nl" target="_blank">DINOloket</a> / '+
      '<a href="https://www.broloket.nl" target="_blank">BRO</a> grondwaterstandonderzoek (GLD).<br>'+
      'Periode '+YEARS[0]+'–'+YEARS[YEARS.length-1]+' · '+DATA.stations.length+
      ' locaties met volledige reeks.<br>Gegenereerd: '+(DATA.generated||'—')+'.';
  }
})();

render();
</script>
</body>
</html>
