<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toolstemp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 3rem 4rem;
      max-width: 640px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #1f6feb;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      color: #f0f6fc;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #8b949e;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.25rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    a:hover { opacity: 0.8; }

    .btn-primary {
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
    }

    .btn-secondary {
      background: transparent;
      color: #e6edf3;
      border: 1px solid #30363d;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #484f58;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Weerribben-Wieden · 2026</span>
    <h1>Plantenpuzzel</h1>
    <p>
      Zoek en fotografeer 20 bijzondere planten<br />in de Weerribben-Wieden.
    </p>
    <div class="links">
      <a class="btn-primary" href="planten.html">Open de puzzel</a>
      <a class="btn-secondary" href="https://github.com/hopsakee/toolstemp">GitHub</a>
    </div>
  </div>
  <footer>MIT License &mdash; Jelle de Jong &mdash; 2026</footer>
</body>
</html>
